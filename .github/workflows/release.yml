name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: ./do build --configuration Release
      - name: NuGet login
        id: nuget
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish release
        run: ./do release
        env:
          DOTNETDO_NUGET_API_KEY: ${{ steps.nuget.outputs.NUGET_API_KEY }}
          GH_TOKEN: ${{ github.token }}
